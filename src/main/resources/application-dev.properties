server.port=${SERVER_PORT:8080}
#spring.threads.virtual.enabled=true
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
#spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migrations

#spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.max-page-size=50

application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_ACCESS_EXPIRATION}
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION}

# MEDIA UPLOAD CONFIG
spring.servlet.multipart.max-file-size=20MB

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=read_only
#management.health.mail.enabled=true
management.metrics.tags.application=${spring.application.name}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# Notification Config
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST}
spring.mail.properties.mail.smtp.ssl.protocols=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_PROTOCOLS}
spring.mail.properties.mail.debug=${SPRING_MAIL_PROPERTIES_MAIL_DEBUG}
notification.email.provider=${NOTIFICATION_EMAIL_PROVIDER:smtp}
notification.email.from-address=${NOTIFICATION_EMAIL_FROM_ADDRESS:${spring.mail.username}}
notification.email.from-name=${NOTIFICATION_EMAIL_FROM_NAME:Perfume Budget}
notification.email.resend.api-key=${RESEND_API_KEY:}
notification.email.resend.base-url=${RESEND_BASE_URL:https://api.resend.com}
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:true}

# REDIS CONFIG
spring.data.redis.url=${REDIS_URL}
#spring.data.redis.host=${REDIS_HOST}
#spring.data.redis.port=6379
redis.cache.ttl.minutes=${REDIS_CACHE_TTL_MINUTES:10}

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}

# OAuth2 Provider Configuration
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Application OAuth2 Settings
application.oauth2.authorized-redirect-uris=${OAUTH2_REDIRECT_URIS:http://localhost:3000/oauth2/redirect}
application.oauth2.cookie-expiry-seconds=180

# Paystack Configuration
paystack.secret=${PAYSTACK_SECRET}
paystack.url=${PAYSTACK_URL}


#Cloudinary Config
storage.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
storage.cloudinary.api-key=${CLOUDINARY_API_KEY}
storage.cloudinary.api-secret=${CLOUDINARY_API_SECRET}

#Data Seeding
perfume.budget.admin.email=${ADMIN_EMAIL}
perfume.budget.admin.password=${ADMIN_PASSWORD}

#Frontend reset password url:
frontend.change-password-url=${FRONTEND_CHANGE_PASSWORD_URL:http://localhost:3000/reset-password}
# Cookie security flags for local dev
application.security.cookie.secure=false
application.security.cookie.same-site=Lax
