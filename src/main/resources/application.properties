spring.application.name=perfume_budget
spring.profiles.active=${ACTIVE_PROFILE}

# HEADER CONFIG FOR HTTPS
server.forward-headers-strategy=framework

# CORS Config
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=${CORS_ALLOWED_METHODS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS}

# Notification Config
notification.email.provider=${NOTIFICATION_EMAIL_PROVIDER:smtp}
notification.email.from-address=${NOTIFICATION_EMAIL_FROM_ADDRESS:${spring.mail.username:}}
notification.email.from-name=${NOTIFICATION_EMAIL_FROM_NAME:Perfume Budget}
notification.email.resend.api-key=${RESEND_API_KEY:}
notification.email.resend.base-url=${RESEND_BASE_URL:https://api.resend.com}
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:true}

# Reserved inventory cleanup
inventory.reservation.expiry-hours=${INVENTORY_RESERVATION_EXPIRY_HOURS:1}
inventory.reservation.cleanup-interval-ms=${INVENTORY_RESERVATION_CLEANUP_INTERVAL_MS:900000}

# Discount cache eviction: clears product caches so date-windowed discounts surface/revert promptly
discount.cache-evict-interval-ms=${DISCOUNT_CACHE_EVICT_INTERVAL_MS:600000}

# ---- Memory / cost tuning ----
# Virtual threads (Java 21): cheap per-request threads instead of ~200 platform thread stacks
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL:true}
# HikariCP: keep few idle connections (also lowers Postgres-side RAM/cost)
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:300000}